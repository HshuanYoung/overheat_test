name: Daily Overheat Deploy

on:
  schedule:
    # 04:00 Asia/Shanghai, which is 20:00 UTC on the previous day.
    - cron: '0 20 * * *'
  workflow_dispatch:

concurrency:
  group: daily-overheat-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Pull, build, and restart overheat
    runs-on: self-hosted

    steps:
      - name: 1. Checkout latest code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: 3. Install dependencies
        run: npm install

      - name: 4. Clean install dependencies
        run: npm ci

      - name: 5. Build
        run: npm run build

      - name: 6. Restart overheat service
        run: sudo systemctl restart overheat

      - name: Send failure email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_SERVER }}
          server_port: ${{ secrets.MAIL_PORT }}
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: '[Overheat] Daily deploy failed'
          to: 2032461502@qq.com
          from: Overheat Deploy <${{ secrets.MAIL_USERNAME }}>
          body: |
            Daily Overheat deploy failed.

            Repository: ${{ github.repository }}
            Workflow: ${{ github.workflow }}
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
